name: Build Theos Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git make curl unzip dpkg build-essential
        
        # 安装 ldid
        sudo curl -L -o /usr/local/bin/ldid "https://github.com/ProcursusTeam/ldid/raw/master/ldid"
        sudo chmod +x /usr/local/bin/ldid
        
    - name: Setup Theos
      run: |
        git clone --depth 1 https://github.com/theos/theos.git /opt/theos
        echo "THEOS=/opt/theos" >> $GITHUB_ENV
        
        # 创建 SDK 目录
        mkdir -p /opt/theos/sdks
        
    - name: Download iOS SDK (Method 1 - iPhoneOS14.4)
      run: |
        cd /opt/theos/sdks
        # 使用 GitHub 上确认可用的 SDK
        curl -L -o iPhoneOS14.4.sdk.zip "https://github.com/xybp888/iOS-SDKs/raw/master/iPhoneOS14.4.sdk.zip?raw=true"
        unzip -q iPhoneOS14.4.sdk.zip || true
        ls -la
        echo "THEOS_SDK_DIR=/opt/theos/sdks" >> $GITHUB_ENV
        
    - name: Download iOS SDK (Method 2 - iPhoneOS13.5)
      if: failure()
      run: |
        cd /opt/theos/sdks
        curl -L -o iPhoneOS13.5.sdk.zip "https://github.com/xybp888/iOS-SDKs/raw/master/iPhoneOS13.5.sdk.zip?raw=true"
        unzip -q iPhoneOS13.5.sdk.zip
        echo "THEOS_SDK_DIR=/opt/theos/sdks" >> $GITHUB_ENV
        
    - name: Download iOS SDK (Method 3 - iPhoneOS12.4)
      if: failure()
      run: |
        cd /opt/theos/sdks
        curl -L -o iPhoneOS12.4.sdk.zip "https://github.com/xybp888/iOS-SDKs/raw/master/iPhoneOS12.4.sdk.zip?raw=true"
        unzip -q iPhoneOS12.4.sdk.zip
        echo "THEOS_SDK_DIR=/opt/theos/sdks" >> $GITHUB_ENV
        
    - name: Download iOS SDK (Method 4 - iPhoneOS11.3)
      if: failure()
      run: |
        cd /opt/theos/sdks
        curl -L -o iPhoneOS11.3.sdk.zip "https://github.com/xybp888/iOS-SDKs/raw/master/iPhoneOS11.3.sdk.zip?raw=true"
        unzip -q iPhoneOS11.3.sdk.zip
        echo "THEOS_SDK_DIR=/opt/theos/sdks" >> $GITHUB_ENV
        
    - name: Create tweak files
      run: |
        mkdir -p tweak/layout/Library/MobileSubstrate/DynamicLibraries
        cd tweak
        
        cat > Tweak.xm << 'EOF'
        #import <Foundation/Foundation.h>
        
        static NSDictionary *kDomainMapping = @{
            @"api1.7ccccccc.com": @"api123.hezijun.top",
            @"api2.7ccccccc.com": @"api123.hezijun.top",
            @"api3.7ccccccc.com": @"api123.hezijun.top",
            @"1437378358.cn": @"api123.hezijun.top"
        };
        
        %hook NSURL
        
        + (instancetype)URLWithString:(NSString *)URLString {
            NSString *newURLString = URLString;
            for (NSString *oldDomain in kDomainMapping) {
                if ([URLString containsString:oldDomain]) {
                    newURLString = [newURLString stringByReplacingOccurrencesOfString:oldDomain 
                                                                           withString:kDomainMapping[oldDomain]];
                }
            }
            if (![newURLString isEqualToString:URLString]) {
                NSLog(@"[DomainRedirect] %@ -> %@", URLString, newURLString);
                return %orig(newURLString);
            }
            return %orig(URLString);
        }
        
        %end
        
        %hook NSString
        
        - (BOOL)isEqualToString:(NSString *)aString {
            for (NSString *oldDomain in kDomainMapping) {
                if ([aString isEqualToString:oldDomain]) {
                    return %orig(kDomainMapping[oldDomain]);
                }
            }
            return %orig(aString);
        }
        
        %end
        EOF
        
        cat > Makefile << 'EOF'
        export THEOS := /opt/theos
        export THEOS_SDK_DIR := /opt/theos/sdks
        
        TARGET = iphone:clang:11.3:10.0
        ARCHS = arm64 arm64e
        
        include $(THEOS)/makefiles/common.mk
        
        TWEAK_NAME = DomainRedirect
        
        DomainRedirect_FILES = Tweak.xm
        DomainRedirect_CFLAGS = -fobjc-arc
        DomainRedirect_FRAMEWORKS = Foundation
        
        include $(THEOS_MAKE_FILES)/tweak.mk
        EOF
        
        cat > control << 'EOF'
        Package: com.ele.domainredirect
        Name: DomainRedirect
        Depends: firmware (>= 10.0), mobilesubstrate
        Version: 1.0.0
        Architecture: iphoneos-arm
        Description: Redirect 7ccccccc domains to api123.hezijun.top
        Maintainer: builder
        Author: builder
        Section: Tweaks
        EOF
        
        cat > DomainRedirect.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>Filter</key>
            <dict>
                <key>Bundles</key>
                <array>
                    <string>me.ele.lpd.talaris.store</string>
                    <string>me.ele.ios.LPDCrowdsourceAppStore</string>
                </array>
            </dict>
        </dict>
        </plist>
        EOF
        
        cp DomainRedirect.plist layout/Library/MobileSubstrate/DynamicLibraries/
        
        echo "Files created"
        
    - name: Build Tweak
      run: |
        cd tweak
        export THEOS=/opt/theos
        export THEOS_SDK_DIR=/opt/theos/sdks
        export PATH=/usr/local/bin:$PATH
        
        # 查看 SDK 目录
        echo "SDK directory contents:"
        ls -la $THEOS_SDK_DIR
        
        # 尝试编译
        make clean || true
        make package || true
        
        # 查找生成的 deb
        find . -name "*.deb"
        
    - name: Upload DEB
      uses: actions/upload-artifact@v4
      with:
        name: DomainRedirect
        path: tweak/*.deb
        
    - name: Upload build folder (for debug)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-debug
        path: |
          tweak/.theos/
          /opt/theos/sdks/
