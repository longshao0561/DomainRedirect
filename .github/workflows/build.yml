name: Build Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build dylib
      run: |
        # 创建源文件
        cat > DomainRedirect.m << 'EOF'
        #import <Foundation/Foundation.h>
        #import <objc/runtime.h>
        
        static NSDictionary *kDomainMapping = @{
            @"api1.7ccccccc.com": @"api123.hezijun.top",
            @"api2.7ccccccc.com": @"api123.hezijun.top",
            @"api3.7ccccccc.com": @"api123.hezijun.top",
            @"1437378358.cn": @"api123.hezijun.top"
        };
        
        static void (*orig_URLWithString)(id self, SEL _cmd, NSString *url);
        
        static id new_URLWithString(id self, SEL _cmd, NSString *urlString) {
            NSString *newURLString = urlString;
            for (NSString *oldDomain in kDomainMapping) {
                if ([urlString containsString:oldDomain]) {
                    newURLString = [newURLString stringByReplacingOccurrencesOfString:oldDomain 
                                                                           withString:kDomainMapping[oldDomain]];
                }
            }
            if (![newURLString isEqualToString:urlString]) {
                NSLog(@"[DomainRedirect] %@ -> %@", urlString, newURLString);
            }
            return ((id (*)(id, SEL, NSString *))orig_URLWithString)(self, _cmd, newURLString);
        }
        
        __attribute__((constructor))
        static void init() {
            NSLog(@"[DomainRedirect] Loaded - redirecting 7ccccccc domains to api123.hezijun.top");
            Class NSURLClass = NSClassFromString(@"NSURL");
            Method m = class_getClassMethod(NSURLClass, @selector(URLWithString:));
            orig_URLWithString = (void *)method_getImplementation(m);
            method_setImplementation(m, (IMP)new_URLWithString);
        }
        EOF
        
        # 编译为 dylib
        clang -dynamiclib -arch arm64 -framework Foundation \
              -o DomainRedirect.dylib DomainRedirect.m \
              -lobjc -fobjc-arc
        
        echo "Build complete"
        ls -la DomainRedirect.dylib
        
    - name: Upload dylib
      uses: actions/upload-artifact@v4
      with:
        name: DomainRedirect.dylib
        path: DomainRedirect.dylib
